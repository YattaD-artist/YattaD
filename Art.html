<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>YattaD · Gallery</title>
<!-- Font & Icons theo phong cách YattaD -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  /* ========== RESET & BIẾN ========== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #444444;
    --accent: #c62828;
    --accent-light: #e53935;
    --border-color: #222;
    --border-light: #ccc;
    --shadow-hard: 4px 4px 0 rgba(0,0,0,0.1);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --transition: 0.2s ease;
  }

  body.dark {
    --bg: #121212;
    --surface: #1e1e1e;
    --text: #e8e8e8;
    --text-secondary: #b0b0b0;
    --accent: #ef4444;
    --accent-light: #f87171;
    --border-color: #555;
    --border-light: #333;
    --shadow-hard: 4px 4px 0 rgba(0,0,0,0.4);
  }

  body {
    font-family: var(--font);
    background-color: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
    line-height: 1.5;
  }

  /* ========== HEADER (giống hệt trang chính) ========== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px;
    background: var(--surface);
    border-bottom: 3px solid var(--border-color);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 0 var(--border-color);
    transition: background var(--transition), border-color var(--transition);
    flex-wrap: wrap;
    gap: 10px;
  }

  .left, .right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .center-title {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 1px 1px 0 var(--border-color);
  }

  .icon-btn {
    background: none;
    border: 2px solid transparent;
    font-size: 1.1rem;
    color: var(--text);
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all var(--transition);
    text-decoration: none;
    border-radius: 0;
  }
  .icon-btn:hover {
    color: var(--accent);
    border-color: var(--border-color);
    background: rgba(0,0,0,0.03);
  }
  body.dark .icon-btn:hover {
    background: rgba(255,255,255,0.05);
  }

  /* ========== MAIN ========== */
  main {
    max-width: 1300px;
    margin: 0 auto;
    padding: 32px 28px 60px;
    width: 100%;
  }

  /* ========== INFO SECTION ========== */
  .info {
    background: var(--surface);
    border: 3px solid var(--border-color);
    padding: 28px 32px;
    box-shadow: var(--shadow-hard);
    transition: background var(--transition), border-color var(--transition);
    margin-bottom: 40px;
  }
  .info h2 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 16px;
    display: inline-block;
    border-bottom: 2px dashed var(--border-color);
    padding-bottom: 6px;
  }
  .info p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .info p:last-child {
    margin-bottom: 0;
  }

  /* ========== MENU GALLERY ========== */
  .menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .menu button {
    display: block;
    text-align: center;
    font-weight: 700;
    font-size: 1rem;
    padding: 12px 16px;
    background: var(--surface);
    color: var(--text);
    border: 2px solid var(--border-color);
    text-decoration: none;
    transition: all var(--transition);
    letter-spacing: 0.5px;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
    text-transform: uppercase;
    cursor: pointer;
    font-family: var(--font);
    width: 100%;
  }
  .menu button:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 1px 1px 0 rgba(0,0,0,0.1);
    transform: translate(1px, 1px);
  }

  /* ========== GALLERY GRID - ẢNH LỚN HƠN, GIẢM KHOẢNG CÁCH, FIT 5 ẢNH NGANG ========== */
  #gallery {
    display: grid;
    gap: 12px;  /* Giảm khoảng cách giữa các ảnh */
    width: 100%;
  }
  
  /* Mặc định cho màn hình nhỏ: tự động xuống hàng */
  @media (max-width: 899px) {
    #gallery {
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    }
  }
  
  /* Desktop đủ rộng: hiển thị chính xác 5 cột, ảnh trải đều full chiều rộng khung */
  @media (min-width: 900px) {
    #gallery {
      grid-template-columns: repeat(5, 1fr);
    }
  }
  
  .thumb {
    width: 100%;
    aspect-ratio: 1 / 1;   /* giữ tỷ lệ vuông, ảnh to hơn nhờ grid cột co giãn */
    object-fit: cover;
    border: 2px solid var(--border-color);
    background: var(--surface);
    box-shadow: var(--shadow-hard);
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .thumb:hover {
    transform: scale(1.02);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.15);
    border-color: var(--accent);
  }

  /* ========== OVERLAY (XEM ẢNH LỚN) ========== */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay-content {
    display: flex;
    gap: 24px;
    max-width: 90%;
    max-height: 90%;
    background: var(--surface);
    border: 3px solid var(--border-color);
    padding: 20px;
    box-shadow: 8px 8px 0 rgba(0,0,0,0.3);
    flex-wrap: wrap;
    justify-content: center;
  }
  #fullImage {
    max-width: 65%;
    max-height: 70vh;
    object-fit: contain;
    border: 1px solid var(--border-light);
    background: #000;
  }
  #imageInfo {
    max-width: 30%;
    min-width: 200px;
    color: var(--text);
    background: var(--surface);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #imageInfo h2 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    border-left: 4px solid var(--accent);
    padding-left: 12px;
  }
  #imageInfo p {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--text-secondary);
  }
  #closeBtn {
    position: absolute;
    top: 24px;
    right: 32px;
    background: var(--surface);
    border: 2px solid var(--border-color);
    color: var(--text);
    width: 44px;
    height: 44px;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  }
  #closeBtn:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 rgba(0,0,0,0.2);
  }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 768px) {
    header {
      padding: 10px 16px;
    }
    .center-title {
      font-size: 1.5rem;
    }
    main {
      padding: 20px 16px 40px;
    }
    .info {
      padding: 20px 18px;
    }
    .menu {
      gap: 12px;
    }
    .menu button {
      font-size: 0.85rem;
      padding: 10px 8px;
    }
    /* Trên mobile vẫn giữ auto-fill, gap nhỏ */
    #gallery {
      gap: 10px;
    }
    .overlay-content {
      flex-direction: column;
      align-items: center;
      max-width: 95%;
      padding: 12px;
    }
    #fullImage {
      max-width: 100%;
      max-height: 50vh;
    }
    #imageInfo {
      max-width: 100%;
      text-align: center;
    }
    #closeBtn {
      top: 12px;
      right: 16px;
      width: 40px;
      height: 40px;
    }
  }

  @media (max-width: 480px) {
    .menu button {
      font-size: 0.75rem;
      padding: 8px 4px;
    }
    #gallery {
      gap: 8px;
    }
  }
</style>
</head>
<body>

<header>
     <div class="left">
    <a href="#" class="icon-btn" id="homeBtn" title="Trang chủ"><i class="fas fa-home"></i></a>
  </div>
    <div class="center-title" id="title">YattaD</div>
    <div class="right">
        <button class="icon-btn" id="theme-toggle" title="Đổi chế độ"><i class="fas fa-adjust"></i></button>
        <button class="icon-btn" id="lang-toggle" title="Đổi ngôn ngữ"><i class="fa-solid fa-language"></i></button>
    </div>
</header>

<main>
  <div class="info">
    <h2 id="introTitle">Lời Nói Đầu</h2>
    <p id="introP1">Chào mừng bạn đến với bộ sưu tập nghệ thuật của tôi! Tại đây bạn có thể khám phá các tác phẩm minh họa, thiết kế nhân vật, commissions và fanart.</p>
    <p id="introP2">Mỗi tác phẩm đều được tôi thực hiện cẩn thận, hy vọng bạn sẽ tìm thấy những khoảnh khắc thú vị và cảm xúc khi thưởng thức.</p>
  </div>

  <div class="menu">
    <button id="menu1" onclick="loadCategory('MinhHoa')">Minh họa</button>
    <button id="menu2" onclick="loadCategory('Concepts')">Thiết kế nhân vật</button>
    <button id="menu3" onclick="loadCategory('Comm')">Commissions</button>
    <button id="menu4" onclick="loadCategory('Fan')">Fanart</button>
  </div>

  <div id="gallery"></div>
</main>

<div id="overlay">
    <button id="closeBtn">✖</button>
    <div class="overlay-content">
        <img id="fullImage" src="" alt="">
        <div id="imageInfo">
            <h2 id="artTitle"></h2>
            <p id="artDesc"></p>
        </div>
    </div>
</div>

<script>
// Theme toggle
const themeBtn = document.getElementById('theme-toggle');
themeBtn.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
});
if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');

// Language toggle
const langBtn = document.getElementById('lang-toggle');
let currentLang = localStorage.getItem('lang') || 'vi';
const translations = {
    vi: {
        introTitle: "Lời Nói Đầu",
        introP1: "Chào mừng bạn đến với bộ sưu tập nghệ thuật của tôi! Tại đây bạn có thể khám phá các tác phẩm minh họa, thiết kế nhân vật, commissions và fanart.",
        introP2: "Mỗi tác phẩm đều được tôi thực hiện cẩn thận, hy vọng bạn sẽ tìm thấy những khoảnh khắc thú vị và cảm xúc khi thưởng thức.",
        menu1: "Minh họa", menu2: "Thiết kế nhân vật", menu3: "Commissions", menu4: "Fanart",
        noTitle: "Không có tiêu đề",
        noDesc: "Chưa có mô tả cho tác phẩm này."
    },
    en: {
        introTitle: "Introduction",
        introP1: "Welcome to my art collection! Here you can explore illustrations, character designs, commissions, and fanart.",
        introP2: "Each work is carefully crafted, I hope you will find interesting moments and emotions while enjoying.",
        menu1: "Illustration", menu2: "Character Design", menu3: "Commissions", menu4: "Fanart",
        noTitle: "No title",
        noDesc: "No description available for this artwork."
    }
};

function switchLanguage() {
    currentLang = currentLang === 'vi' ? 'en' : 'vi';
    localStorage.setItem('lang', currentLang);
    document.getElementById('introTitle').innerHTML = translations[currentLang].introTitle;
    document.getElementById('introP1').innerHTML = translations[currentLang].introP1;
    document.getElementById('introP2').innerHTML = translations[currentLang].introP2;
    document.getElementById('menu1').innerHTML = translations[currentLang].menu1;
    document.getElementById('menu2').innerHTML = translations[currentLang].menu2;
    document.getElementById('menu3').innerHTML = translations[currentLang].menu3;
    document.getElementById('menu4').innerHTML = translations[currentLang].menu4;
    // Cập nhật modal nếu đang mở
    const overlayVisible = document.getElementById('overlay').style.display === 'flex';
    if (overlayVisible && window.currentArtKey) {
        const detail = imageDetails[window.currentArtKey]?.[currentLang];
        document.getElementById('artTitle').innerHTML = detail?.title || translations[currentLang].noTitle;
        document.getElementById('artDesc').innerHTML = detail?.desc || translations[currentLang].noDesc;
    }
}
langBtn.addEventListener('click', switchLanguage);
document.addEventListener('DOMContentLoaded', () => { 
    if(currentLang === 'en') switchLanguage(); 
});

// Gallery data
const gallery = document.getElementById('gallery');
const overlay = document.getElementById('overlay');
const fullImage = document.getElementById('fullImage');
const artTitle = document.getElementById('artTitle');
const artDesc = document.getElementById('artDesc');
const closeBtn = document.getElementById('closeBtn');

const categoryImages = {
    "MinhHoa": 5,
    "Concepts": 5,
    "Comm": 5,
    "Fan": 5
};

// Mở rộng thêm một vài demo detail cho các ảnh khác (nếu có)
const imageDetails = {
  "arts/MinhHoa/01": { 
    vi: { title: "Red", desc: "Thợ rèn gấu trúc đỏ" },
    en: { title: "Red", desc: "Red panda blacksmith" }
  },
  "arts/MinhHoa/02": { 
    vi: { title: "Ruby", desc: "Cháu gái của Red, Kiếm sĩ gấu trúc đỏ" },
    en: { title: "Ruby", desc: "Red's niece, red panda swordswoman" }
  },
  "arts/MinhHoa/03": { 
    vi: { title: "Bình minh trên phố cổ", desc: "Phố cổ Hà Nội dưới ánh nắng sớm" },
    en: { title: "Dawn in Old Quarter", desc: "Hanoi Old Quarter in early morning light" }
  },
  "arts/MinhHoa/04": { 
    vi: { title: "Cơn mưa chiều", desc: "Cô gái với ô trong mưa" },
    en: { title: "Afternoon Rain", desc: "Girl with umbrella in the rain" }
  },
  "arts/MinhHoa/05": { 
    vi: { title: "Linh hồn rừng xanh", desc: "Nữ thần rừng và những chú hươu" },
    en: { title: "Forest Spirit", desc: "Forest goddess and deers" }
  },
  // Concepts
  "arts/Concepts/01": { vi: { title: "Hiệp sĩ bóng đêm", desc: "Áo giáp huyền bí" }, en: { title: "Dark Knight", desc: "Mysterious armor" } },
  "arts/Concepts/02": { vi: { title: "Pháp sư ánh sáng", desc: "Ma thuật thuần khiết" }, en: { title: "Light Mage", desc: "Pure magic" } },
  "arts/Concepts/03": { vi: { title: "Cơ binh chiến đấu", desc: "Cỗ máy chiến tranh" }, en: { title: "Combat Mech", desc: "War machine" } },
  "arts/Concepts/04": { vi: { title: "Yêu tinh rừng già", desc: "Sinh vật huyền bí" }, en: { title: "Forest Elf", desc: "Mystical creature" } },
  "arts/Concepts/05": { vi: { title: "Hải tặc râu đỏ", desc: "Thuyền trưởng khét tiếng" }, en: { title: "Redbeard Pirate", desc: "Infamous captain" } },
  // Comm
  "arts/Comm/01": { vi: { title: "Chân dung OC", desc: "Commission - Nhân vật nguyên tác" }, en: { title: "OC Portrait", desc: "Commission - Original character" } },
  "arts/Comm/02": { vi: { title: "Gia đình hạnh phúc", desc: "Tranh chân dung gia đình" }, en: { title: "Happy Family", desc: "Family portrait" } },
  "arts/Comm/03": { vi: { title: "Chiến binh thú nhân", desc: "Nhân vật thú nhân" }, en: { title: "Beast Warrior", desc: "Beastman character" } },
  "arts/Comm/04": { vi: { title: "Lãng khách", desc: "Samurai cô độc" }, en: { title: "Wanderer", desc: "Lonely samurai" } },
  "arts/Comm/05": { vi: { title: "Tiên nữ", desc: "Nhân vật cổ tích" }, en: { title: "Fairy", desc: "Fairytale character" } },
  // Fan
  "arts/Fan/01": { vi: { title: "Goku SSJ", desc: "Dragon Ball fanart" }, en: { title: "Goku SSJ", desc: "Dragon Ball fanart" } },
  "arts/Fan/02": { vi: { title: "Naruto - Rasengan", desc: "Naruto fanart" }, en: { title: "Naruto - Rasengan", desc: "Naruto fanart" } },
  "arts/Fan/03": { vi: { title: "Luffy Gear 5", desc: "One Piece fanart" }, en: { title: "Luffy Gear 5", desc: "One Piece fanart" } },
  "arts/Fan/04": { vi: { title: "Nezuko", desc: "Kimetsu no Yaiba" }, en: { title: "Nezuko", desc: "Kimetsu no Yaiba" } },
  "arts/Fan/05": { vi: { title: "Spy x Family", desc: "Anya & Bond" }, en: { title: "Spy x Family", desc: "Anya & Bond" } }
};

function loadCategory(cat) {
    gallery.innerHTML = "";
    const total = categoryImages[cat] || 0;

    for (let i = 1; i <= total; i++) {
        const baseName = String(i).padStart(2, '0');
        const thumbPath = `arts/${cat}/${baseName}.min.webp`;
        const fullPath = `arts/${cat}/${baseName}.webp`;

        const img = document.createElement('img');
        img.dataset.src = thumbPath;
        img.className = "thumb";
        img.onclick = () => openFull(fullPath, cat, baseName);
        gallery.appendChild(img);

        const observer = new IntersectionObserver((entries, obs) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    img.src = img.dataset.src;
                    const preload = new Image();
                    preload.src = fullPath;
                    obs.unobserve(img);
                }
            });
        }, { threshold: 0.1 });
        observer.observe(img);
    }
}

function openFull(path, cat, baseName) {
    const key = `arts/${cat}/${baseName}`;
    window.currentArtKey = key;
    const detail = imageDetails[key] ? imageDetails[key][currentLang] : null;
    fullImage.src = path;
    artTitle.textContent = detail?.title || translations[currentLang].noTitle;
    artDesc.textContent = detail?.desc || translations[currentLang].noDesc;
    overlay.style.display = "flex";
}

// Xử lý click từ hàm onclick có sẵn trong loadCategory (cần truyền thêm tham số)
// Để tương thích với code cũ, ghi đè hàm openFull cũ
window.openFull = openFull;

closeBtn.onclick = () => overlay.style.display = "none";
overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.style.display = "none";
});

// Load mặc định
loadCategory('MinhHoa');

  document.getElementById('homeBtn').addEventListener('click', function(e) {
    e.preventDefault();
    location.href = 'index.html?nocache=' + Date.now();
});
</script>
</body>
</html>
