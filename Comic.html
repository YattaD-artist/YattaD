<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YattaD - Truyện Tranh</title>

<link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: 'Saira', sans-serif;
    background-color: var(--bg);
    color: var(--text);

    --bg: #ede9eb;
    --text: #1a2129;
    --accent: #e32630;
}

body.dark {
    --bg: #1b1b1b;
    --text: #f5f5f5;
    --accent: #1cd9cf;
}

header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 24px;
    border-bottom:1px solid #ccc;
    position:sticky;
    top:0;
    background:var(--bg);
}

.center-title {
    flex:1;
    text-align:center;
    font-weight:800;
    font-size:2rem;
    color:var(--accent);
}

.icon-btn {
    background:none;
    border:none;
    cursor:pointer;
    font-size:1.2rem;
    color:var(--text);
}

main {
    padding:30px;
}

.menu {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
}

.menuItem {
    text-decoration:none;
    color:inherit;
    border:2px solid var(--text);
    border-radius:12px;
    padding:10px;
    text-align:center;
    transition:0.25s;
}

.menuItem img {
    width:100%;
    border-radius:8px;
}

.menuItem:hover {
    transform:translateY(-4px);
    border-color:var(--accent);
    box-shadow:0 6px 12px rgba(0,0,0,0.15);
}

@media(max-width:768px){
    main{padding:15px;}
}
</style>
</head>

<body>

<header>
    <div></div>
    <div class="center-title" id="title">YattaD</div>
    <div>
        <button class="icon-btn" id="theme-toggle"><i class="fas fa-adjust"></i></button>
        <button class="icon-btn" id="lang-toggle"><i class="fa-solid fa-language"></i></button>
    </div>
</header>

<main>
<div class="menu">

<a class="menuItem" href="comics/Thi.html" target="_blank">
    <img src="placeholder.jpg">
    <p id="menu1">Bộ truyện ngắn dự thi PunkgaMe</p>
</a>

<a class="menuItem" href="comics/PunkgaMerch.html" target="_blank">
    <img src="placeholder.jpg">
    <p id="menu2">Bộ Áo mới của nhà vua</p>
</a>

<a class="menuItem" href="comics/Vuot.html" target="_blank">
    <img src="placeholder.jpg">
    <p id="menu3">Vượt</p>
</a>

<a class="menuItem" href="comics/StillComeTrue.html" target="_blank">
    <img src="placeholder.jpg">
    <p id="menu4">Vẫn đúng</p>
</a>

<a class="menuItem" href="comics/Red&Ruby.html" target="_blank">
    <img src="placeholder.jpg">
    <p id="menu5">Red và Ruby</p>
</a>

<a class="menuItem" href="comics/ThuanThien.html" target="_blank">
    <img src="placeholder.jpg">
    <p id="menu6">Thuận Thiên</p>
</a>

</div>
</main>

<script>
// Theme
const themeBtn=document.getElementById('theme-toggle');
themeBtn.onclick=()=>{
    document.body.classList.toggle('dark');
    localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light');
};
if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark');

// Language
const langBtn=document.getElementById('lang-toggle');
let currentLang=localStorage.getItem('lang')||'vi';

const translations={
vi:{
title:"YattaD",
menu1:"Bộ truyện ngắn dự thi PunkgaMe",
menu2:"Bộ Áo mới của nhà vua",
menu3:"Vượt",
menu4:"Vẫn đúng",
menu5:"Red và Ruby",
menu6:"Thuận Thiên"
},
en:{
title:"YattaD",
menu1:"PunkgaMe Short Stories",
menu2:"The Emperor's New Clothes",
menu3:"Overcome",
menu4:"Still True",
menu5:"Red & Ruby",
menu6:"Thuan Thien"
}
};

function switchLanguage(){
    currentLang=currentLang==='vi'?'en':'vi';
    localStorage.setItem('lang',currentLang);

    for(const key in translations[currentLang]){
        const el=document.getElementById(key);
        if(el) el.textContent=translations[currentLang][key];
    }
}

langBtn.onclick=switchLanguage;

if(currentLang==='en') switchLanguage();
</script>

</body>
</html>
