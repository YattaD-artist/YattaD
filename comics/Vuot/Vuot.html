<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuot - Reader</title>
    <style>
        :root { 
            --border-width: 4px; 
            --main-bg: #f5f5f5; 
            --chapter-bg: #eeeeee;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #1a1a1a; font-family: sans-serif; height: 100vh; overflow: hidden; }

        .app-container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            grid-template-rows: 1fr 80px;
            height: 100vh; gap: 12px; padding: 12px; background-color: #1a1a1a;
        }

        .panel { 
            background-color: var(--main-bg); 
            border: var(--border-width) solid #000; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative;
        }

        /* BÊN TRÁI: CHƯƠNG & TRANG */
        .sidebar-left-top { grid-column: 1; grid-row: 1; padding: 10px; }
        .chapter-list { overflow-y: auto; flex-grow: 1; }
        .chapter-item {
            width: 100%; padding: 12px; margin-bottom: 8px; 
            background: var(--chapter-bg); 
            border: 3px solid #000;
            cursor: pointer; font-weight: bold; text-align: center; text-transform: uppercase;
        }
        .chapter-item:hover { background: #e0e0e0; }
        .chapter-item.active { background: #000; color: #fff; }
        
        .sidebar-left-bottom { 
            grid-column: 1; grid-row: 2; 
            justify-content: center; align-items: center; 
            font-weight: 900; font-size: 1.1rem; 
        }

        /* GIỮA: KHU VỰC ĐỌC */
        .main-reader { 
            grid-column: 2; grid-row: 1 / span 2; 
            overflow-y: auto; 
            background-color: #333;
            scroll-snap-type: y mandatory;
            position: relative;
        }

        .main-reader::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("paper-texture.png");
            background-repeat: repeat;
            opacity: 0.1;
            pointer-events: none;
            z-index: 10;
        }

        #gallery { 
            display: grid; grid-template-columns: 1fr 1fr; width: 100%; 
            row-gap: 20vh; padding-bottom: 100px;
            position: relative;
            z-index: 1;
        }
        
        .img-container { display: flex; width: 100%; height: 95vh; align-items: center; scroll-snap-align: center; }
        .img-container:nth-child(odd) { justify-content: flex-end; } 
        .img-container:nth-child(even) { justify-content: flex-start; }
        
        .img-container img { max-width: 100%; max-height: 90vh; opacity: 0; transition: opacity 0.3s; border: none; }
        .img-container img.loaded { opacity: 1; }
        .empty-slot { width: 100%; height: 95vh; }

        /* BÊN PHẢI */
        .sidebar-right-top { grid-column: 3; grid-row: 1; }
        .cover-box { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .cover-box img { max-width: 100%; border: 3px solid #000; }
        
        .ad-area { 
            height: 120px; border-top: 4px solid #000; 
            display: flex; align-items: center; justify-content: center; 
            background: #e0e0e0; font-weight: bold; 
        }

        .sidebar-right-bottom { grid-column: 3; grid-row: 2; padding: 15px; display: flex; align-items: center; }
        #page-search { 
            width: 100%; padding: 12px; 
            border: 4px solid #000; 
            background-color: var(--chapter-bg);
            text-align: center; font-weight: bold; font-size: 1rem;
            outline: none;
        }

        #sentinel { height: 50px; width: 100%; grid-column: span 2; }

        @media (max-width: 768px) {
            .app-container { display: flex; flex-direction: column; padding: 0; gap: 0; }
            .sidebar-left-top {
                position: fixed; top: 0; left: 0; width: 100%; height: 100px;
                z-index: 100; display: flex; overflow-x: auto; padding: 5px;
                border-bottom: 4px solid #000; background: var(--main-bg);
            }
            .chapter-list { display: flex; flex-direction: row; gap: 10px; }
            .chapter-item { flex: 0 0 auto; min-width: max-content; padding: 10px 14px; }
            .sidebar-left-bottom, .sidebar-right-top, .sidebar-right-bottom { display: none; }
            .main-reader { margin-top: 100px; height: calc(100vh - 100px); }
            #gallery { display: block; padding: 0; }
            .img-container { height: auto; justify-content: center !important; }
            .img-container img { width: 100%; height: auto; max-height: none; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="panel sidebar-left-top">
        <div style="text-align:center; font-weight:bold; margin-bottom:10px; border-bottom:2px solid #000; padding-bottom:5px">DANH MỤC</div>
        <div class="chapter-list" id="chapter-list-ui"></div>
    </div>
    
    <div class="panel sidebar-left-bottom">
        TRANG: <span id="page-indicator">-</span>
    </div>

    <div class="panel main-reader" id="reader-scroll-area">
        <div id="gallery"></div>
        <div id="sentinel"></div>
    </div>

    <div class="panel sidebar-right-top">
        <div style="text-align:center; font-weight:bold; padding:5px; border-bottom:4px solid #000">BÌA CHƯƠNG</div>
        <div class="cover-box">
            <img id="chapter-cover" src="" alt=" ">
        </div>
        <div class="ad-area">Chúc Bạn Đọc Truyện Vui Vẻ!</div>
    </div>

    <div class="panel sidebar-right-bottom">
        <input type="number" id="page-search" placeholder="NHẬP SỐ TRANG..." min="1">
    </div>
</div>

<script>
    const TOTAL_CHAPTERS = 1;
    const IMAGE_EXT = ".jpg";

    let currentChapter = 1;
    let currentIndex = 1;
    let isEnded = false;
    let isFirstLoad = true; // Biến đánh dấu lần load đầu tiên của chương
    let visiblePages = new Set();

    const gallery = document.getElementById('gallery');
    const chapterListUI = document.getElementById('chapter-list-ui');
    const coverImg = document.getElementById('chapter-cover');
    const pageIndicator = document.getElementById('page-indicator');
    const scrollArea = document.getElementById('reader-scroll-area');
    const pageSearch = document.getElementById('page-search');

    function initChapters() {
        chapterListUI.innerHTML = "";
        for (let i = 1; i <= TOTAL_CHAPTERS; i++) {
            const btn = document.createElement('div');
            btn.className = 'chapter-item';
            btn.textContent = `Chương ${i}`;
            btn.id = `btn-chap-${i}`;
            btn.onclick = () => loadChapter(i);
            chapterListUI.appendChild(btn);
        }
        loadChapter(1);
    }

    function loadChapter(idx) {
        currentChapter = idx;
        currentIndex = 1;
        isEnded = false;
        isFirstLoad = true; // Reset trạng thái khi sang chương mới
        visiblePages.clear();
        
        document.querySelectorAll('.chapter-item').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-chap-${idx}`)?.classList.add('active');
        
        gallery.innerHTML = '<div class="empty-slot"></div>';
        coverImg.src = `Chap${idx}/0${IMAGE_EXT}`;
        coverImg.onerror = () => coverImg.src = "";

        scrollArea.scrollTop = 0;
        loadNextBatch();
    }

    function attemptLoadImage(imgElement, chapter, index, zeroCount = 0) {
        let fileName = String(index);
        if (zeroCount > 0) fileName = fileName.padStart(zeroCount + 1, '0');
        imgElement.src = `Chap${chapter}/${fileName}${IMAGE_EXT}`;

        imgElement.onerror = () => {
            if (zeroCount < 2) { // Thử các định dạng 01, 001
                attemptLoadImage(imgElement, chapter, index, zeroCount + 1);
            } else {
                imgElement.closest('.img-container')?.remove();
                isEnded = true;
            }
        };
    }

    function createImgContainer(index) {
        const container = document.createElement('div');
        container.className = 'img-container';
        container.dataset.page = index;
        container.id = `cp-${currentChapter}-${index}`;
        const img = new Image();
        img.loading = "lazy";
        attemptLoadImage(img, currentChapter, index);
        img.onload = () => img.classList.add('loaded');
        container.appendChild(img);
        pageObserver.observe(container);
        return container;
    }

    function loadNextBatch() {
        if (isEnded) return;

        // Quyết định số lượng ảnh cần load
        const amountToLoad = isFirstLoad ? 11 : 10;
        
        for (let i = 0; i < amountToLoad; i++) {
            if (isEnded) break;
            gallery.appendChild(createImgContainer(currentIndex));
            currentIndex++;
        }

        // Sau lần load đầu tiên, chuyển flag về false
        isFirstLoad = false;
    }

    const pageObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) visiblePages.add(entry.target.dataset.page);
            else visiblePages.delete(entry.target.dataset.page);
        });
        if (visiblePages.size > 0) {
            pageIndicator.textContent = Array.from(visiblePages).sort((a,b)=>a-b).join(' - ');
        }
    }, { threshold: 0.2, root: scrollArea });

    const scrollObserver = new IntersectionObserver((entries) => {
        // Nếu sentinel xuất hiện và không phải đang ở trạng thái kết thúc truyện
        if (entries[0].isIntersecting && !isEnded) {
            loadNextBatch();
        }
    }, { root: scrollArea, rootMargin: '800px' });

    scrollObserver.observe(document.getElementById('sentinel'));

    pageSearch.onkeypress = (e) => {
        if (e.key === 'Enter') {
            const targetPage = parseInt(pageSearch.value);
            if (targetPage > 0) {
                let safetyCounter = 0;
                while (targetPage >= currentIndex && !isEnded && safetyCounter < 100) {
                    loadNextBatch();
                    safetyCounter++;
                }
                setTimeout(() => {
                    const targetElement = document.getElementById(`cp-${currentChapter}-${targetPage}`);
                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);
            }
            pageSearch.value = "";
            pageSearch.blur();
        }
    };

    initChapters();
</script>
</body>
</html>
