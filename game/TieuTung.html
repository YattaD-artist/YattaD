<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cờ Tùng Tiêu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --text: #1a1a1a;
      --accent: #c62828;
      --border-color: #1a1a1a;
      --shadow: 4px 4px 0 rgba(0,0,0,0.1);
      --transition: 0.2s ease;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }

    #game-layout {
      display: flex;
      width: 100%;
      height: 100%;
      max-width: 1200px;
      max-height: 800px;
      gap: 20px;
    }

    #board-container {
      flex: 1 1 auto;
      min-width: 0;
      background: var(--surface);
      border: 3px solid var(--border-color);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    /* Ảnh bìa */
    #cover-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #1a1a1a; /* nền tối cho ảnh */
      z-index: 10;
      display: block;
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
      z-index: 5;
    }
    canvas:active {
      cursor: grabbing;
    }

    #panel {
      width: 260px;
      background: var(--surface);
      border: 3px solid var(--border-color);
      box-shadow: var(--shadow);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      font-weight: 500;
      color: var(--text);
    }

    #panel h2 {
      font-size: 1.4rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 4px;
      border-bottom: 2px dashed var(--border-color);
      padding-bottom: 8px;
    }

    button {
      background: var(--surface);
      color: var(--text);
      border: 2px solid var(--border-color);
      font-family: inherit;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 10px 14px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      transition: all var(--transition);
      width: 100%;
    }

    button:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 1px 1px 0 rgba(0,0,0,0.1);
      transform: translate(1px, 1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      background: var(--surface);
      color: var(--text);
      border-color: var(--border-color);
      box-shadow: none;
      transform: none;
    }

    .turn-info {
      font-weight: 700;
      font-size: 1rem;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .undo-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #winMessage {
      margin-top: 5px;
      font-weight: 700;
      color: var(--accent);
      font-size: 1rem;
      border-top: 1px solid var(--border-color);
      padding-top: 8px;
      display: none;
    }

    @media (max-width: 700px) {
      #game-layout {
        flex-direction: column;
        gap: 10px;
        max-height: none;
      }
      #panel {
        width: 100%;
        flex-shrink: 0;
        padding: 16px;
        gap: 12px;
      }
      #board-container {
        min-height: 55vh;
      }
    }
  </style>
</head>
<body>
  <div id="game-layout">
    <div id="board-container">
      <img id="cover-image" src="TieuTung/TieuTung.jpg" alt="Tieu Tung">
      <canvas id="boardCanvas"></canvas>
    </div>

    <div id="panel">
      <div id="mode-panel">
        <h2>Cờ Tùng Tiêu</h2>
        <p>Chọn mốc thắng:</p>
        <button class="mode-btn" data-mode="4">Mốc 4</button>
        <button class="mode-btn" data-mode="5">Mốc 5</button>
        <button class="mode-btn" data-mode="6">Mốc 6</button>
      </div>

      <div id="game-panel" style="display: none;">
        <div class="turn-info">Lượt: <span id="turnText">Tiêu</span></div>
        <div class="undo-group">
          <button id="undoTieuBtn">Hoàn tác Tiêu (<span id="undoTieuCount">3</span>)</button>
          <button id="undoTungBtn">Hoàn tác Tùng (<span id="undoTungCount">3</span>)</button>
        </div>
        <button id="restartBtn">Chơi lại</button>
        <button id="backToModeBtn">Đổi mốc</button>
        <div id="winMessage"></div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      // ──────────────────────────────
      // THAM SỐ
      // ──────────────────────────────
      const CELL_SIZE = 60;
      let winCondition = 5;
      let scale = 1;
      let offsetX = 0, offsetY = 0;

      let gameState = new Map();
      let history = [];
      let currentPlayer = "Tieu";
      let undoTieuRemaining = 3;
      let undoTungRemaining = 3;
      let gameOver = false;
      let winner = null;
      let winningCells = [];
      let preWinCamera = null;
      let lastMovePos = null;
      let gameActive = false; // kiểm soát game đã bắt đầu chưa

      const canvas = document.getElementById("boardCanvas");
      const coverImage = document.getElementById("cover-image");
      let ctx;

      // Ảnh quân cờ
      const images = {
        Tieu: new Image(),
        Tung: new Image(),
        TieuWin: new Image(),
        TieuLose: new Image(),
        TungWin: new Image(),
        TungLose: new Image()
      };
      let allImagesLoaded = false;

      const paperTexture = new Image();
      let textureLoaded = false;

      // UI elements
      const modePanel = document.getElementById("mode-panel");
      const gamePanel = document.getElementById("game-panel");
      const turnText = document.getElementById("turnText");
      const undoTieuBtn = document.getElementById("undoTieuBtn");
      const undoTungBtn = document.getElementById("undoTungBtn");
      const undoTieuCountSpan = document.getElementById("undoTieuCount");
      const undoTungCountSpan = document.getElementById("undoTungCount");
      const winMessageDiv = document.getElementById("winMessage");

      // ──────────────────────────────
      // TẢI ẢNH
      // ──────────────────────────────
      function loadImages() {
  images.Tieu.src = "TieuTung/Tieu.png";
  images.Tung.src = "TieuTung/Tung.png";
  images.TieuWin.src = "TieuTung/TieuWin.png";
  images.TieuLose.src = "TieuTung/TieuLose.png";
  images.TungWin.src = "TieuTung/TungWin.png";
  images.TungLose.src = "TieuTung/TungLose.png";
  paperTexture.src = "paper-texture.png";

  let loadedCount = 0;
  const totalImages = 7;
  const onImageLoad = () => {
    loadedCount++;
    if (loadedCount === totalImages) {
      allImagesLoaded = true;
      textureLoaded = true;
    }
  };
  for (const key in images) {
    images[key].onload = onImageLoad;
    images[key].onerror = () => onImageLoad();
  }
  paperTexture.onload = onImageLoad;
  paperTexture.onerror = () => {
    textureLoaded = false;
    onImageLoad();
  };
}

      // ──────────────────────────────
      // CHỌN ẢNH THEO TRẠNG THÁI
      // ──────────────────────────────
      function getUnitImage(player) {
        if (gameOver && winner) {
          if (player === winner) {
            return player === "Tieu" ? images.TieuWin : images.TungWin;
          } else {
            return player === "Tieu" ? images.TieuLose : images.TungLose;
          }
        }
        return player === "Tieu" ? images.Tieu : images.Tung;
      }

      // ──────────────────────────────
      // TOẠ ĐỘ
      // ──────────────────────────────
      function worldToScreen(col, row) {
        return {
          x: (col + 0.5) * CELL_SIZE * scale + offsetX,
          y: (row + 0.5) * CELL_SIZE * scale + offsetY
        };
      }

      function screenToWorld(sx, sy) {
        return {
          col: Math.floor((sx - offsetX) / (CELL_SIZE * scale)),
          row: Math.floor((sy - offsetY) / (CELL_SIZE * scale))
        };
      }

      // ──────────────────────────────
      // VẼ
      // ──────────────────────────────
      function drawBoard() {
        if (!ctx) ctx = canvas.getContext("2d");
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        // Nền tối
        ctx.fillStyle = "#f0eee6";
        ctx.fillRect(0, 0, w, h);

        // Texture (opacity 0.15)
        if (textureLoaded && paperTexture.complete && paperTexture.naturalWidth > 0) {
          const pattern = ctx.createPattern(paperTexture, "repeat");
          if (pattern) {
            ctx.save();
            ctx.globalAlpha = 0.15; // đã giảm từ 0.25
            ctx.fillStyle = pattern;
            ctx.fillRect(0, 0, w, h);
            ctx.restore();
          }
        }

        const step = CELL_SIZE * scale;
        if (step < 4) return;

        const startCol = Math.floor(-offsetX / step) - 1;
        const endCol = Math.ceil((w - offsetX) / step) + 1;
        const startRow = Math.floor(-offsetY / step) - 1;
        const endRow = Math.ceil((h - offsetY) / step) + 1;

        // Lưới
        ctx.strokeStyle = "#888";
        ctx.lineWidth = 1;
        for (let col = startCol; col <= endCol; col++) {
          const x = col * step + offsetX;
          ctx.beginPath();
          ctx.moveTo(x, startRow * step + offsetY);
          ctx.lineTo(x, (endRow + 1) * step + offsetY);
          ctx.stroke();
        }
        for (let row = startRow; row <= endRow; row++) {
          const y = row * step + offsetY;
          ctx.beginPath();
          ctx.moveTo(startCol * step + offsetX, y);
          ctx.lineTo((endCol + 1) * step + offsetX, y);
          ctx.stroke();
        }

        // Vẽ quân cờ
        for (const [key, player] of gameState.entries()) {
          const [col, row] = key.split(",").map(Number);
          const { x, y } = worldToScreen(col, row);
          const size = step * 0.85;
          const half = size / 2;

          const isWinning = gameOver && winningCells.some(c => c.col === col && c.row === row);
          const isLastMove = lastMovePos && lastMovePos.col === col && lastMovePos.row === row && gameState.get(key) === player;

          const img = getUnitImage(player);

          const drawImageOrFallback = () => {
            if (allImagesLoaded && img.complete && img.naturalWidth > 0) {
              const hash = (col * 31 + row * 17) % 360;
              const angle = hash * Math.PI / 180;
              ctx.save();
              ctx.translate(x, y);
              ctx.rotate(angle);

              if (isWinning) {
                ctx.shadowColor = "#c62828";
                ctx.shadowBlur = 20;
              } else if (isLastMove) {
                ctx.shadowColor = "#ffd700";
                ctx.shadowBlur = 16;
              }

              ctx.drawImage(img, -half, -half, size, size);
              ctx.restore();
            } else {
              const color = player === "Tieu" ? "#c62828" : "#1a1a1a";
              ctx.fillStyle = color;
              ctx.font = `bold ${size * 0.7}px "Inter", sans-serif`;
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.save();
              if (isWinning) {
                ctx.shadowColor = "#c62828";
                ctx.shadowBlur = 18;
              } else if (isLastMove) {
                ctx.shadowColor = "#ffd700";
                ctx.shadowBlur = 14;
              }
              ctx.fillText(player === "Tieu" ? "X" : "O", x, y);
              ctx.restore();
            }
          };

          drawImageOrFallback();
        }
      }

      // ──────────────────────────────
      // KIỂM TRA THẮNG
      // ──────────────────────────────
      function checkWin(col, row, player) {
        const dirs = [[1,0],[0,1],[1,1],[1,-1]];
        for (const [dx, dy] of dirs) {
          const cells = [{col, row}];
          for (let i = 1; i < winCondition; i++) {
            const nc = col + dx * i, nr = row + dy * i;
            if (gameState.get(`${nc},${nr}`) === player) cells.push({col: nc, row: nr});
            else break;
          }
          for (let i = 1; i < winCondition; i++) {
            const nc = col - dx * i, nr = row - dy * i;
            if (gameState.get(`${nc},${nr}`) === player) cells.push({col: nc, row: nr});
            else break;
          }
          if (cells.length >= winCondition) return cells;
        }
        return null;
      }

      function zoomToWinningCells() {
        if (winningCells.length === 0) return;
        const cols = winningCells.map(c => c.col);
        const rows = winningCells.map(c => c.row);
        const minCol = Math.min(...cols), maxCol = Math.max(...cols);
        const minRow = Math.min(...rows), maxRow = Math.max(...rows);
        const worldW = (maxCol - minCol + 1) * CELL_SIZE;
        const worldH = (maxRow - minRow + 1) * CELL_SIZE;
        const centerWorldX = (minCol + maxCol + 1) / 2 * CELL_SIZE;
        const centerWorldY = (minRow + maxRow + 1) / 2 * CELL_SIZE;
        const padding = 120;
        const newScale = Math.min(canvas.width / (worldW + padding), canvas.height / (worldH + padding), 2.2);
        offsetX = canvas.width / 2 - centerWorldX * newScale;
        offsetY = canvas.height / 2 - centerWorldY * newScale;
        scale = newScale;
      }

      // ──────────────────────────────
      // ĐẶT QUÂN
      // ──────────────────────────────
      function placePiece(col, row) {
        if (!gameActive || gameOver) return false;
        const key = `${col},${row}`;
        if (gameState.has(key)) return false;

        gameState.set(key, currentPlayer);
        history.push({col, row, player: currentPlayer});
        lastMovePos = {col, row};

        const winCells = checkWin(col, row, currentPlayer);
        if (winCells) {
          gameOver = true;
          winner = currentPlayer;
          winningCells = winCells;
          preWinCamera = {offsetX, offsetY, scale};
          zoomToWinningCells();
          showWinMessage(currentPlayer);
          drawBoard();
          updateUndoButtons();
          return true;
        }

        currentPlayer = currentPlayer === "Tieu" ? "Tung" : "Tieu";
        updateTurnDisplay();
        updateUndoButtons();
        drawBoard();
        return true;
      }

      // ──────────────────────────────
      // HOÀN TÁC THƯỜNG
      // ──────────────────────────────
      function undoNormal(player) {
        if (!gameActive || history.length === 0) return;
        const last = history[history.length - 1];
        if (last.player !== player) return;

        if (player === "Tieu" && undoTieuRemaining <= 0) return;
        if (player === "Tung" && undoTungRemaining <= 0) return;

        const key = `${last.col},${last.row}`;
        gameState.delete(key);
        history.pop();

        if (player === "Tieu") undoTieuRemaining--;
        else undoTungRemaining--;

        lastMovePos = history.length > 0 ? {col: history[history.length-1].col, row: history[history.length-1].row} : null;

        currentPlayer = player;
        updateTurnDisplay();
        updateUndoButtons();
        drawBoard();
      }

      // ──────────────────────────────
      // HOÀN TÁC SAU KHI THẮNG
      // ──────────────────────────────
      function undoAfterWin(loser) {
        if (!gameActive || !gameOver) return;
        if (history.length < 2) return;

        const last = history[history.length - 1];
        if (last.player === loser) return;

        const prev = history[history.length - 2];
        if (prev.player !== loser) return;

        if (loser === "Tieu" && undoTieuRemaining <= 0) return;
        if (loser === "Tung" && undoTungRemaining <= 0) return;

        const winKey = `${last.col},${last.row}`;
        gameState.delete(winKey);
        history.pop();

        const loseKey = `${prev.col},${prev.row}`;
        gameState.delete(loseKey);
        history.pop();

        if (loser === "Tieu") undoTieuRemaining--;
        else undoTungRemaining--;

        gameOver = false;
        winner = null;
        winningCells = [];
        if (preWinCamera) {
          offsetX = preWinCamera.offsetX;
          offsetY = preWinCamera.offsetY;
          scale = preWinCamera.scale;
          preWinCamera = null;
        }
        winMessageDiv.style.display = "none";

        lastMovePos = history.length > 0 ? {col: history[history.length-1].col, row: history[history.length-1].row} : null;

        currentPlayer = loser;
        updateTurnDisplay();
        updateUndoButtons();
        drawBoard();
      }

      function undoPlayer(player) {
        if (gameOver) {
          if ((winner === "Tieu" && player === "Tung") || (winner === "Tung" && player === "Tieu")) {
            undoAfterWin(player);
          }
        } else {
          undoNormal(player);
        }
      }

      function updateTurnDisplay() {
        turnText.textContent = currentPlayer === "Tieu" ? "Tiêu" : "Tùng";
      }

      function updateUndoButtons() {
        undoTieuCountSpan.textContent = undoTieuRemaining;
        undoTungCountSpan.textContent = undoTungRemaining;

        if (gameOver) {
          undoTieuBtn.disabled = !(winner === "Tung" && undoTieuRemaining > 0);
          undoTungBtn.disabled = !(winner === "Tieu" && undoTungRemaining > 0);
        } else {
          const last = history.length > 0 ? history[history.length - 1] : null;
          undoTieuBtn.disabled = !(last && last.player === "Tieu" && undoTieuRemaining > 0);
          undoTungBtn.disabled = !(last && last.player === "Tung" && undoTungRemaining > 0);
        }
      }

      function showWinMessage(player) {
        winMessageDiv.textContent = player === "Tieu" ? "Tiêu thắng!" : "Tùng thắng!";
        winMessageDiv.style.display = "block";
      }

      // ──────────────────────────────
      // RESET
      // ──────────────────────────────
      function resetGame() {
        gameState.clear();
        history = [];
        currentPlayer = "Tieu";
        undoTieuRemaining = 3;
        undoTungRemaining = 3;
        gameOver = false;
        winner = null;
        winningCells = [];
        preWinCamera = null;
        lastMovePos = null;
        winMessageDiv.style.display = "none";

        offsetX = canvas.width / 2;
        offsetY = canvas.height / 2;
        scale = 1;

        updateTurnDisplay();
        updateUndoButtons();
        drawBoard();
      }

      // ──────────────────────────────
      // SỰ KIỆN (chỉ xử lý nếu gameActive)
      // ──────────────────────────────
      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let cx, cy;
        if (e.touches) {
          cx = e.touches[0].clientX;
          cy = e.touches[0].clientY;
        } else {
          cx = e.clientX;
          cy = e.clientY;
        }
        return {
          x: (cx - rect.left) * scaleX,
          y: (cy - rect.top) * scaleY
        };
      }

      let isPanning = false;
      let lastPan = null;
      let panStart = null;
      let panStartTime = 0;
      let pinchStartDist = 0;
      let pinchStartScale = 1;
      let isPinching = false;

      function onPointerDown(e) {
        if (!gameActive) return;
        e.preventDefault();
        if (e.touches && e.touches.length === 2) {
          isPinching = true;
          isPanning = false;
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          pinchStartDist = Math.hypot(dx, dy);
          pinchStartScale = scale;
          return;
        }
        const pos = getCanvasPos(e);
        lastPan = {x: pos.x, y: pos.y};
        panStart = {x: pos.x, y: pos.y};
        panStartTime = Date.now();
        isPanning = false;
      }

      function onPointerMove(e) {
        if (!gameActive) return;
        e.preventDefault();
        if (isPinching && e.touches && e.touches.length === 2) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.hypot(dx, dy);
          if (pinchStartDist > 0) {
            scale = Math.max(0.2, Math.min(3, pinchStartScale * (dist / pinchStartDist)));
            drawBoard();
          }
          return;
        }

        if ((e.touches && e.touches.length === 1) || (e.buttons === 1 && e.type === "mousemove")) {
          const pos = getCanvasPos(e);
          if (lastPan) {
            const dx = pos.x - lastPan.x;
            const dy = pos.y - lastPan.y;
            if (panStart && (Math.abs(pos.x - panStart.x) > 3 || Math.abs(pos.y - panStart.y) > 3)) {
              isPanning = true;
            }
            if (isPanning) {
              offsetX += dx;
              offsetY += dy;
              drawBoard();
            }
            lastPan = {x: pos.x, y: pos.y};
          }
        }
      }

      function onPointerUp(e) {
        if (!gameActive) return;
        e.preventDefault();
        if (isPinching) {
          isPinching = false;
          pinchStartDist = 0;
          return;
        }
        if (!isPanning && panStart && Date.now() - panStartTime < 300) {
          const world = screenToWorld(panStart.x, panStart.y);
          placePiece(world.col, world.row);
        }
        isPanning = false;
        lastPan = null;
        panStart = null;
        panStartTime = 0;
      }

      function onWheel(e) {
        if (!gameActive) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const my = (e.clientY - rect.top) * (canvas.height / rect.height);
        const factor = e.deltaY > 0 ? 0.9 : 1.1;
        const newScale = Math.max(0.2, Math.min(3, scale * factor));
        offsetX = mx - (mx - offsetX) * (newScale / scale);
        offsetY = my - (my - offsetY) * (newScale / scale);
        scale = newScale;
        drawBoard();
      }

      function bindEvents() {
        canvas.addEventListener("mousedown", onPointerDown);
        window.addEventListener("mousemove", onPointerMove);
        window.addEventListener("mouseup", onPointerUp);
        canvas.addEventListener("wheel", onWheel, {passive: false});
        canvas.addEventListener("touchstart", onPointerDown, {passive: false});
        canvas.addEventListener("touchmove", onPointerMove, {passive: false});
        canvas.addEventListener("touchend", onPointerUp);
        canvas.addEventListener("touchcancel", onPointerUp);
        canvas.addEventListener("contextmenu", e => e.preventDefault());
      }

      function resizeCanvas() {
        const container = document.getElementById("board-container");
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        if (offsetX === 0 && offsetY === 0) {
          offsetX = canvas.width / 2;
          offsetY = canvas.height / 2;
        }
        drawBoard();
      }

      // ──────────────────────────────
      // UI PANEL
      // ──────────────────────────────
      function startGame(mode) {
        winCondition = parseInt(mode);
        modePanel.style.display = "none";
        gamePanel.style.display = "flex";
        gamePanel.style.flexDirection = "column";
        coverImage.style.display = "none"; // ẩn ảnh bìa
        gameActive = true;
        resizeCanvas();
        resetGame();
      }

      function backToMode() {
        gameActive = false;
        gameOver = true; // không cho tương tác
        gamePanel.style.display = "none";
        modePanel.style.display = "block";
        coverImage.style.display = "block"; // hiện lại ảnh bìa
        // Vẽ lại canvas trống (nếu muốn giữ sạch)
        if (ctx) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }

      document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.addEventListener("click", e => startGame(e.currentTarget.dataset.mode));
      });

      undoTieuBtn.addEventListener("click", () => undoPlayer("Tieu"));
      undoTungBtn.addEventListener("click", () => undoPlayer("Tung"));
      document.getElementById("restartBtn").addEventListener("click", resetGame);
      document.getElementById("backToModeBtn").addEventListener("click", backToMode);

      window.addEventListener("resize", () => {
        if (gameActive) resizeCanvas();
      });

      // Khởi tạo
      loadImages();
      bindEvents();
      modePanel.style.display = "block";
      gamePanel.style.display = "none";
      coverImage.style.display = "block";
      gameActive = false;
      // Vẽ canvas ban đầu (sẽ trống)
      ctx = canvas.getContext("2d");
      canvas.width = document.getElementById("board-container").clientWidth;
      canvas.height = document.getElementById("board-container").clientHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    })();
  </script>
</body>
</html>
