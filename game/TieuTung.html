<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>YattaD · Cờ Tiêu - Tùng</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon32.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --text: #1a1a1a;
      --accent: #c62828;
      --border-color: #1a1a1a;
      --shadow: 4px 4px 0 rgba(0,0,0,0.1);
      --transition: 0.2s ease;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
      overflow: hidden;
    }
    #game-layout {
      display: flex;
      width: 100%;
      height: 100%;
      max-width: 1200px;
      max-height: 800px;
      gap: 20px;
      align-items: flex-end;
      justify-content: center;
    }
    /* ========== BOARD (chung) ========== */
    #board-container {
      background: var(--surface);
      border: 3px solid var(--border-color);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      touch-action: none;
      flex-shrink: 0;
    }
    #cover-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #1a1a1a;
      z-index: 10;
      display: block;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
      z-index: 5;
    }
    canvas:active {
      cursor: grabbing;
    }

    /* ========== PANEL (desktop) ========== */
    #panel {
      width: 260px;
      background: var(--surface);
      border: 3px solid var(--border-color);
      box-shadow: var(--shadow);
      padding: 20px 20px 30px;
      display: flex;
      flex-direction: column;
      gap: 0;
      font-weight: 500;
      color: var(--text);
      flex-shrink: 0;
    }
    .panel-content {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    #panel h2 {
      font-size: 1.4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      text-align: center;
      border-bottom: 2px dashed var(--border-color);
      padding-bottom: 8px;
      margin-bottom: 8px;
      -webkit-text-stroke: 1px var(--border-color);
      text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
    }
    .mode-description {
      margin: 8px 0 12px;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-secondary, #444);
      text-align: center;
    }
    .mode-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      width: 100%;
    }
    .mode-btn {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      aspect-ratio: 1 / 1;
      width: 80%;
      max-width: 180px;
      background: var(--surface);
      border: 2px solid var(--border-color);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all var(--transition);
      text-transform: uppercase;
      font-family: inherit;
      font-weight: 600;
      color: var(--text);
      padding: 12px 8px;
      gap: 6px;
    }
    .mode-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 1px 1px 0 rgba(0,0,0,0.1);
      transform: translate(1px, 1px);
    }
    .mode-btn .mode-title {
      font-size: 1.1rem;
      font-weight: 800;
      line-height: 1.2;
    }
    .mode-btn .mode-desc {
      font-size: 0.6rem;
      font-weight: 400;
      opacity: 0.7;
      line-height: 1.3;
      white-space: normal;
      word-break: break-word;
      max-width: 100%;
    }
    .undo-group {
      display: flex;
      gap: 8px;
    }
    .undo-btn {
      flex: 1 1 0;
      aspect-ratio: 1 / 1;
      border: 2px solid var(--border-color);
      background: var(--surface);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      text-transform: uppercase;
      color: var(--text);
      padding: 6px 4px;
      gap: 3px;
      white-space: nowrap;
      word-break: normal;
    }
    .undo-btn:hover:not(:disabled) {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 1px 1px 0 rgba(0,0,0,0.1);
      transform: translate(1px, 1px);
    }
    .undo-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .undo-btn .small {
      font-size: 0.9rem;
      opacity: 0.9;
    }
    .undo-btn .big {
      font-size: 1.2rem;
      font-weight: 800;
    }
    .action-group {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }
    .action-group button {
      width: 100%;
      padding: 12px 8px;
      font-size: 0.85rem;
    }
    button {
      background: var(--surface);
      color: var(--text);
      border: 2px solid var(--border-color);
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
      transition: all var(--transition);
    }
    button:hover:not(:disabled) {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 1px 1px 0 rgba(0,0,0,0.1);
      transform: translate(1px, 1px);
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    #winImage {
      transition: all 0.2s ease;
      border: none !important;
      box-shadow: none !important;
      width: 80%;
      max-width: 200px;
      margin: 0 auto;
    }
    #winMessage {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      line-height: 1.2;
      color: var(--accent);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
      margin-bottom: 8px;
      display: none;
      word-break: break-word;
      min-height: 3.5rem;
    }
    .turn-info {
      font-weight: 700;
      font-size: 0.7rem;
      padding: 6px 0;
      color: var(--accent);
      opacity: 0.8;
      text-align: center;
      border: none;
      background: none;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .highlight-btn {
      background: var(--accent) !important;
      color: #fff !important;
      border-color: var(--accent) !important;
    }

    /* ========== MOBILE HEADER & FOOTER (ẩn trên desktop) ========== */
    #mobile-header, #mobile-footer {
      display: none;
      background: var(--surface);
      border: 3px solid var(--border-color);
      box-shadow: var(--shadow);
      width: 100%;
      padding: 12px 16px;
      text-align: center;
    }
    #mobile-header h2 {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--accent);
      margin: 0 0 4px;
      -webkit-text-stroke: 0.5px var(--border-color);
    }
    #mobile-winMessage {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--accent);
      min-height: 1.8rem;
      margin-bottom: 4px;
    }
    #mobile-footer {
      padding: 10px 16px;
      max-height: 45vh;
      overflow-y: auto;
    }

    /* ========== MOBILE LAYOUT ========== */
    @media (max-width: 700px) {
      body {
        padding: 0;
      }
      #game-layout {
        flex-direction: column;
        gap: 0;
        max-height: none;
        height: 100vh;
        align-items: center;
      }
      /* Ẩn panel desktop */
      #panel {
        display: none;
      }
      /* Hiện header/footer mobile */
      #mobile-header, #mobile-footer {
        display: block;
        flex-shrink: 0;
      }
      #board-container {
        flex: 1 1 auto;
        min-height: 0;
        width: auto;
        height: auto;
        border-left: none;
        border-right: none;
        border-top: none;
      }
      /* Bàn cờ luôn vuông vừa khung */
      #board-container {
        width: 100%;
        height: auto;
      }
      /* Nút không còn vuông */
      .undo-btn {
        aspect-ratio: auto;
        padding: 10px 6px;
        font-size: 0.7rem;
        gap: 4px;
      }
      .undo-btn .big {
        font-size: 0.8rem;
      }
      .undo-btn .small {
        font-size: 0.65rem;
      }
      .mode-list {
        flex-direction: row;
        gap: 8px;
      }
      .mode-btn {
        flex: 1 1 0;
        aspect-ratio: auto;
        width: auto;
        max-width: none;
        padding: 10px 6px;
        font-size: 0.75rem;
        gap: 4px;
      }
      .mode-btn .mode-title {
        font-size: 0.9rem;
      }
      .mode-btn .mode-desc {
        font-size: 0.55rem;
        opacity: 0.8;
      }
      #winImage {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div id="game-layout">
    <!-- ========== MOBILE HEADER ========== -->
    <div id="mobile-header">
      <h2>Cờ Tiêu - Tùng</h2>
      <div id="mobile-winMessage"></div>
      <div class="turn-info">Lượt: <span id="mobile-turnText">Tiêu</span></div>
    </div>

    <!-- ========== BOARD ========== -->
    <div id="board-container">
      <img id="cover-image" src="TieuTung/TieuTung.jpg" alt="Tieu Tung">
      <canvas id="boardCanvas"></canvas>
    </div>

    <!-- ========== MOBILE FOOTER ========== -->
    <div id="mobile-footer">
      <!-- Màn chọn mốc (mobile) -->
      <div id="mobile-mode-panel">
        <div class="mode-description">Chọn mốc thắng:</div>
        <div class="mode-list">
          <button class="mode-btn" data-mode="4">
            <span class="mode-title">Mốc 4</span>
            <span class="mode-desc">Thắng khi xếp 4 quân liên tiếp</span>
          </button>
          <button class="mode-btn" data-mode="5">
            <span class="mode-title">Mốc 5</span>
            <span class="mode-desc">Thắng khi xếp 5 quân liên tiếp</span>
          </button>
          <button class="mode-btn" data-mode="6">
            <span class="mode-title">Mốc 6</span>
            <span class="mode-desc">Thắng khi xếp 6 quân liên tiếp</span>
          </button>
        </div>
      </div>
      <!-- Màn game (mobile) -->
      <div id="mobile-game-panel" style="display: none; flex-direction: column;">
        <div class="undo-group">
          <button id="mobile-undoTieuBtn" class="undo-btn">
            <span class="small">Hoàn tác</span>
            <span class="big">TIÊU</span>
            <span class="small">Còn <span id="mobile-undoTieuCount">3</span> lượt</span>
          </button>
          <button id="mobile-undoTungBtn" class="undo-btn">
            <span class="small">Hoàn tác</span>
            <span class="big">TÙNG</span>
            <span class="small">Còn <span id="mobile-undoTungCount">3</span> lượt</span>
          </button>
        </div>
        <div class="action-group">
          <button id="mobile-restartBtn">Chơi lại</button>
          <button id="mobile-backToModeBtn">Đổi mốc</button>
        </div>
      </div>
    </div>

    <!-- ========== PANEL DESKTOP ========== -->
    <div id="panel">
      <h2>Cờ Tiêu - Tùng</h2>
      <div class="panel-content">
        <div id="mode-panel">
          <div class="mode-description">Chọn mốc thắng:</div>
          <div class="mode-list">
            <button class="mode-btn" data-mode="4">
              <span class="mode-title">Mốc 4</span>
              <span class="mode-desc">Thắng khi xếp 4 quân liên tiếp</span>
            </button>
            <button class="mode-btn" data-mode="5">
              <span class="mode-title">Mốc 5</span>
              <span class="mode-desc">Thắng khi xếp 5 quân liên tiếp</span>
            </button>
            <button class="mode-btn" data-mode="6">
              <span class="mode-title">Mốc 6</span>
              <span class="mode-desc">Thắng khi xếp 6 quân liên tiếp</span>
            </button>
          </div>
        </div>

        <div id="game-panel" style="display: none; flex-direction: column;">
          <img id="winImage" src="" alt="Người thắng" style="display: none;">
          <div id="winMessage"></div>

          <div class="undo-group">
            <button id="undoTieuBtn" class="undo-btn">
              <span class="small">Hoàn tác</span>
              <span class="big">TIÊU</span>
              <span class="small">Còn <span id="undoTieuCount">3</span> lượt</span>
            </button>
            <button id="undoTungBtn" class="undo-btn">
              <span class="small">Hoàn tác</span>
              <span class="big">TÙNG</span>
              <span class="small">Còn <span id="undoTungCount">3</span> lượt</span>
            </button>
          </div>

          <div class="action-group">
            <button id="restartBtn">Chơi lại</button>
            <button id="backToModeBtn">Đổi mốc</button>
          </div>

          <div class="turn-info">Lượt: <span id="turnText">Tiêu</span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const CELL_SIZE = 60;
      const MAX_SCALE = 3;
      const MIN_SCALE = 0.2;
      const ZOOM_WIN_PADDING = 120;
      const ZOOM_WIN_MAX_SCALE = 2.2;
      const TAP_THRESHOLD_MS = 300;
      const TAP_THRESHOLD_PX = 3;

      let winCondition = 5;
      let scale = 1;
      let offsetX = 0, offsetY = 0;

      let gameState = new Map();
      let history = [];
      let currentPlayer = "Tieu";
      let undoTieuRemaining = 3;
      let undoTungRemaining = 3;
      let gameOver = false;
      let winner = null;
      let winningCells = [];
      let preWinCamera = null;
      let lastMovePos = null;
      let gameActive = false;
      let rafId = null;

      const canvas = document.getElementById("boardCanvas");
      const boardContainer = document.getElementById("board-container");
      const coverImage = document.getElementById("cover-image");
      let ctx = canvas.getContext("2d");

      const images = {};
      const imageReady = {};
      let imagesLoadedCount = 0;
      const TOTAL_IMAGES = 7;

      // Desktop elements
      const modePanel = document.getElementById("mode-panel");
      const gamePanel = document.getElementById("game-panel");
      const turnText = document.getElementById("turnText");
      const undoTieuBtn = document.getElementById("undoTieuBtn");
      const undoTungBtn = document.getElementById("undoTungBtn");
      const undoTieuCountSpan = document.getElementById("undoTieuCount");
      const undoTungCountSpan = document.getElementById("undoTungCount");
      const winMessageDiv = document.getElementById("winMessage");
      const winImage = document.getElementById("winImage");
      const restartBtn = document.getElementById("restartBtn");
      const backToModeBtn = document.getElementById("backToModeBtn");

      // Mobile elements
      const mobileHeader = document.getElementById("mobile-header");
      const mobileFooter = document.getElementById("mobile-footer");
      const mobileWinMessage = document.getElementById("mobile-winMessage");
      const mobileTurnText = document.getElementById("mobile-turnText");
      const mobileModePanel = document.getElementById("mobile-mode-panel");
      const mobileGamePanel = document.getElementById("mobile-game-panel");
      const mobileUndoTieuBtn = document.getElementById("mobile-undoTieuBtn");
      const mobileUndoTungBtn = document.getElementById("mobile-undoTungBtn");
      const mobileUndoTieuCount = document.getElementById("mobile-undoTieuCount");
      const mobileUndoTungCount = document.getElementById("mobile-undoTungCount");
      const mobileRestartBtn = document.getElementById("mobile-restartBtn");
      const mobileBackToModeBtn = document.getElementById("mobile-backToModeBtn");

      const gameLayout = document.getElementById("game-layout");
      const panel = document.getElementById("panel");

      function loadImages() {
        const sources = {
          Tieu: "TieuTung/Tieu.png",
          Tung: "TieuTung/Tung.png",
          TieuWin: "TieuTung/TieuWin.png",
          TieuLose: "TieuTung/TieuLose.png",
          TungWin: "TieuTung/TungWin.png",
          TungLose: "TieuTung/TungLose.png",
          paper: "paper-texture.png"
        };
        for (const [key, src] of Object.entries(sources)) {
          const img = new Image();
          img.src = src;
          img.onload = () => {
            imageReady[key] = true;
            imagesLoadedCount++;
            if (imagesLoadedCount === TOTAL_IMAGES && (gameActive || modePanel.style.display === "none")) {
              requestDrawBoard();
            }
          };
          img.onerror = () => {
            imagesLoadedCount++;
          };
          images[key] = img;
        }
      }

      function isImageReady(img) {
        return img && img.complete && img.naturalWidth > 0;
      }

      function getUnitImage(player) {
        if (gameOver && winner) {
          if (player === winner) {
            const key = player === "Tieu" ? "TieuWin" : "TungWin";
            return isImageReady(images[key]) ? images[key] : null;
          } else {
            const key = player === "Tieu" ? "TieuLose" : "TungLose";
            return isImageReady(images[key]) ? images[key] : null;
          }
        }
        const key = player === "Tieu" ? "Tieu" : "Tung";
        return isImageReady(images[key]) ? images[key] : null;
      }

      function worldToScreen(col, row) {
        return {
          x: (col + 0.5) * CELL_SIZE * scale + offsetX,
          y: (row + 0.5) * CELL_SIZE * scale + offsetY
        };
      }

      function screenToWorld(sx, sy) {
        const step = CELL_SIZE * scale;
        if (step <= 0) return { col: 0, row: 0 };
        return {
          col: Math.floor((sx - offsetX) / step),
          row: Math.floor((sy - offsetY) / step)
        };
      }

      function drawBoard() {
        if (!ctx) ctx = canvas.getContext("2d");
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = "#f0eee6";
        ctx.fillRect(0, 0, w, h);

        if (isImageReady(images.paper)) {
          const pattern = ctx.createPattern(images.paper, "repeat");
          if (pattern) {
            ctx.save();
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = pattern;
            ctx.fillRect(0, 0, w, h);
            ctx.restore();
          }
        }

        const step = CELL_SIZE * scale;
        if (step < 4) return;

        const startCol = Math.floor(-offsetX / step) - 1;
        const endCol = Math.ceil((w - offsetX) / step) + 1;
        const startRow = Math.floor(-offsetY / step) - 1;
        const endRow = Math.ceil((h - offsetY) / step) + 1;

        ctx.strokeStyle = "#888";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let col = startCol; col <= endCol; col++) {
          const x = col * step + offsetX;
          ctx.moveTo(x, startRow * step + offsetY);
          ctx.lineTo(x, (endRow + 1) * step + offsetY);
        }
        for (let row = startRow; row <= endRow; row++) {
          const y = row * step + offsetY;
          ctx.moveTo(startCol * step + offsetX, y);
          ctx.lineTo((endCol + 1) * step + offsetX, y);
        }
        ctx.stroke();

        const size = step * 0.85;
        const half = size / 2;
        for (const [key, player] of gameState.entries()) {
          const [col, row] = key.split(",").map(Number);
          const { x, y } = worldToScreen(col, row);
          const isWinning = gameOver && winningCells.some(c => c.col === col && c.row === row);
          const isLastMove = lastMovePos && lastMovePos.col === col && lastMovePos.row === row && gameState.get(key) === player;
          const img = getUnitImage(player);

          if (img) {
            // Không xoay ảnh nữa
            ctx.save();
            ctx.translate(x, y);
            if (isWinning) { ctx.shadowColor = "#c62828"; ctx.shadowBlur = 20; }
            else if (isLastMove) { ctx.shadowColor = "#ffd700"; ctx.shadowBlur = 16; }
            ctx.drawImage(img, -half, -half, size, size);
            ctx.restore();
          } else {
            ctx.fillStyle = player === "Tieu" ? "#c62828" : "#1a1a1a";
            ctx.font = `bold ${size * 0.7}px "Inter", sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.save();
            if (isWinning) { ctx.shadowColor = "#c62828"; ctx.shadowBlur = 18; }
            else if (isLastMove) { ctx.shadowColor = "#ffd700"; ctx.shadowBlur = 14; }
            ctx.fillText(player === "Tieu" ? "X" : "O", x, y);
            ctx.restore();
          }
        }
      }

      function requestDrawBoard() {
        if (rafId) return;
        rafId = requestAnimationFrame(() => {
          rafId = null;
          drawBoard();
        });
      }

      function checkWin(col, row, player) {
        const dirs = [[1,0],[0,1],[1,1],[1,-1]];
        for (const [dx, dy] of dirs) {
          const cells = [{col, row}];
          for (let i = 1; i < winCondition; i++) {
            const nc = col + dx * i, nr = row + dy * i;
            if (gameState.get(`${nc},${nr}`) === player) cells.push({col: nc, row: nr});
            else break;
          }
          for (let i = 1; i < winCondition; i++) {
            const nc = col - dx * i, nr = row - dy * i;
            if (gameState.get(`${nc},${nr}`) === player) cells.push({col: nc, row: nr});
            else break;
          }
          if (cells.length >= winCondition) return cells;
        }
        return null;
      }

      function zoomToWinningCells() {
        if (winningCells.length === 0) return;
        const cols = winningCells.map(c => c.col);
        const rows = winningCells.map(c => c.row);
        const minCol = Math.min(...cols), maxCol = Math.max(...cols);
        const minRow = Math.min(...rows), maxRow = Math.max(...rows);
        const worldW = (maxCol - minCol + 1) * CELL_SIZE;
        const worldH = (maxRow - minRow + 1) * CELL_SIZE;
        const centerWorldX = (minCol + maxCol + 1) / 2 * CELL_SIZE;
        const centerWorldY = (minRow + maxRow + 1) / 2 * CELL_SIZE;
        const newScale = Math.min(canvas.width / (worldW + ZOOM_WIN_PADDING), canvas.height / (worldH + ZOOM_WIN_PADDING), ZOOM_WIN_MAX_SCALE);
        offsetX = canvas.width / 2 - centerWorldX * newScale;
        offsetY = canvas.height / 2 - centerWorldY * newScale;
        scale = newScale;
      }

      function placePiece(col, row) {
        if (!gameActive || gameOver) return false;
        const key = `${col},${row}`;
        if (gameState.has(key)) return false;

        gameState.set(key, currentPlayer);
        history.push({col, row, player: currentPlayer});
        lastMovePos = {col, row};

        const winCells = checkWin(col, row, currentPlayer);
        if (winCells) {
          gameOver = true;
          winner = currentPlayer;
          winningCells = winCells;
          preWinCamera = {offsetX, offsetY, scale};
          zoomToWinningCells();
          showWinMessage(currentPlayer);
          updateRestartButton();
          requestDrawBoard();
          updateUndoButtons();
          return true;
        }

        currentPlayer = currentPlayer === "Tieu" ? "Tung" : "Tieu";
        updateTurnDisplay();
        updateUndoButtons();
        requestDrawBoard();
        return true;
      }

      function undoNormal(player) {
        if (!gameActive || history.length === 0) return;
        const last = history[history.length - 1];
        if (last.player !== player) return;
        if ((player === "Tieu" && undoTieuRemaining <= 0) || (player === "Tung" && undoTungRemaining <= 0)) return;

        gameState.delete(`${last.col},${last.row}`);
        history.pop();
        if (player === "Tieu") undoTieuRemaining--;
        else undoTungRemaining--;

        lastMovePos = history.length > 0 ? {col: history[history.length-1].col, row: history[history.length-1].row} : null;
        currentPlayer = player;
        updateTurnDisplay();
        updateUndoButtons();
        requestDrawBoard();
      }

      function undoAfterWin(loser) {
        if (!gameActive || !gameOver || history.length < 2) return;
        const last = history[history.length - 1];
        if (last.player === loser) return;
        const prev = history[history.length - 2];
        if (prev.player !== loser) return;
        if ((loser === "Tieu" && undoTieuRemaining <= 0) || (loser === "Tung" && undoTungRemaining <= 0)) return;

        gameState.delete(`${last.col},${last.row}`);
        history.pop();
        gameState.delete(`${prev.col},${prev.row}`);
        history.pop();
        if (loser === "Tieu") undoTieuRemaining--;
        else undoTungRemaining--;

        gameOver = false;
        winner = null;
        winningCells = [];
        if (preWinCamera) {
          offsetX = preWinCamera.offsetX;
          offsetY = preWinCamera.offsetY;
          scale = preWinCamera.scale;
          preWinCamera = null;
        }
        winMessageDiv.style.display = "none";
        winImage.style.display = "none";
        mobileWinMessage.textContent = "";
        updateRestartButton();
        lastMovePos = history.length > 0 ? {col: history[history.length-1].col, row: history[history.length-1].row} : null;
        currentPlayer = loser;
        updateTurnDisplay();
        updateUndoButtons();
        requestDrawBoard();
      }

      function undoPlayer(player) {
        if (gameOver) {
          if ((winner === "Tieu" && player === "Tung") || (winner === "Tung" && player === "Tieu")) {
            undoAfterWin(player);
          }
        } else {
          undoNormal(player);
        }
      }

      function updateTurnDisplay() {
        const text = currentPlayer === "Tieu" ? "Tiêu" : "Tùng";
        turnText.textContent = text;
        mobileTurnText.textContent = text;
      }

      function updateUndoButtons() {
        undoTieuCountSpan.textContent = undoTieuRemaining;
        undoTungCountSpan.textContent = undoTungRemaining;
        mobileUndoTieuCount.textContent = undoTieuRemaining;
        mobileUndoTungCount.textContent = undoTungRemaining;

        const disableTieu = gameOver ? !(winner === "Tung" && undoTieuRemaining > 0) : !(history.length > 0 && history[history.length-1].player === "Tieu" && undoTieuRemaining > 0);
        const disableTung = gameOver ? !(winner === "Tieu" && undoTungRemaining > 0) : !(history.length > 0 && history[history.length-1].player === "Tung" && undoTungRemaining > 0);

        undoTieuBtn.disabled = disableTieu;
        undoTungBtn.disabled = disableTung;
        mobileUndoTieuBtn.disabled = disableTieu;
        mobileUndoTungBtn.disabled = disableTung;
      }

      function showWinMessage(player) {
        const msg = player === "Tieu" ? "Tiêu thắng!" : "Tùng thắng!";
        winMessageDiv.textContent = msg;
        winMessageDiv.style.display = "block";
        mobileWinMessage.textContent = msg;

        if (!window.matchMedia('(max-width: 700px)').matches) {
          winImage.src = player === "Tieu" ? "TieuTung/TieuWin.png" : "TieuTung/TungWin.png";
          winImage.style.display = "block";
        }
      }

      function resetGame() {
        gameState.clear();
        history = [];
        currentPlayer = "Tieu";
        undoTieuRemaining = 3;
        undoTungRemaining = 3;
        gameOver = false;
        winner = null;
        winningCells = [];
        preWinCamera = null;
        lastMovePos = null;
        winMessageDiv.style.display = "none";
        winImage.style.display = "none";
        mobileWinMessage.textContent = "";
        offsetX = canvas.width / 2;
        offsetY = canvas.height / 2;
        scale = 1;
        updateTurnDisplay();
        updateUndoButtons();
        updateRestartButton();
        drawBoard();
      }

      function adjustBoardSize() {
        const isMobile = window.matchMedia('(max-width: 700px)').matches;
        const layoutRect = gameLayout.getBoundingClientRect();

        if (isMobile) {
          const headerH = mobileHeader.offsetHeight;
          const footerH = mobileFooter.offsetHeight;
          const availH = layoutRect.height - headerH - footerH;
          const size = Math.min(layoutRect.width, availH);
          boardContainer.style.width = size + 'px';
          boardContainer.style.height = size + 'px';
        } else {
          const panelRect = panel.getBoundingClientRect();
          const maxWidth = layoutRect.width - panelRect.width - 20;
          const maxHeight = layoutRect.height;
          const size = Math.min(maxWidth, maxHeight);
          boardContainer.style.width = size + 'px';
          boardContainer.style.height = size + 'px';
          panel.style.height = size + 'px';
        }

        canvas.width = boardContainer.clientWidth;
        canvas.height = boardContainer.clientHeight;
        if (offsetX === 0 && offsetY === 0) {
          offsetX = canvas.width / 2;
          offsetY = canvas.height / 2;
        }
        drawBoard();
      }

      let resizeTimeout;
      function onResize() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          if (gameActive || modePanel.style.display !== "none") adjustBoardSize();
        }, 100);
      }

      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      }

      /* ========== CẢM ỨNG & ZOOM ========== */
      let isPanning = false;
      let lastPan = null;
      let panStart = null;
      let panStartTime = 0;
      let isPinching = false;
      let pinchStartDist = 0;
      let pinchStartScale = 1;
      let pinchStartMid = null;

      function onPointerDown(e) {
        if (!gameActive) return;
        e.preventDefault();
        if (e.touches && e.touches.length === 2) {
          isPinching = true;
          isPanning = false;
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          pinchStartDist = Math.hypot(dx, dy);
          pinchStartScale = scale;
          const midClientX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
          const midClientY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
          const rect = canvas.getBoundingClientRect();
          pinchStartMid = {
            x: (midClientX - rect.left) * (canvas.width / rect.width),
            y: (midClientY - rect.top) * (canvas.height / rect.height)
          };
          return;
        }
        const pos = getCanvasPos(e);
        lastPan = {x: pos.x, y: pos.y};
        panStart = {x: pos.x, y: pos.y};
        panStartTime = Date.now();
        isPanning = false;
      }

      function onPointerMove(e) {
        if (!gameActive) return;
        e.preventDefault();
        if (isPinching && e.touches && e.touches.length === 2) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.hypot(dx, dy);
          if (pinchStartDist > 0) {
            const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, pinchStartScale * (dist / pinchStartDist)));
            const worldX = (pinchStartMid.x - offsetX) / scale;
            const worldY = (pinchStartMid.y - offsetY) / scale;
            offsetX = pinchStartMid.x - worldX * newScale;
            offsetY = pinchStartMid.y - worldY * newScale;
            scale = newScale;
            requestDrawBoard();
          }
          return;
        }
        if ((e.touches && e.touches.length === 1) || (e.buttons === 1 && e.type === "mousemove")) {
          const pos = getCanvasPos(e);
          if (lastPan) {
            const dx = pos.x - lastPan.x;
            const dy = pos.y - lastPan.y;
            if (panStart && (Math.abs(pos.x - panStart.x) > TAP_THRESHOLD_PX || Math.abs(pos.y - panStart.y) > TAP_THRESHOLD_PX)) {
              isPanning = true;
            }
            if (isPanning) {
              offsetX += dx;
              offsetY += dy;
              requestDrawBoard();
            }
            lastPan = {x: pos.x, y: pos.y};
          }
        }
      }

      function onPointerUp(e) {
        if (!gameActive) return;
        e.preventDefault();
        if (isPinching && e.touches && e.touches.length === 1) {
          isPinching = false;
          const pos = getCanvasPos(e);
          lastPan = {x: pos.x, y: pos.y};
          panStart = null;
          isPanning = false;
          return;
        }
        if (isPinching) {
          isPinching = false;
          pinchStartDist = 0;
          return;
        }
        if (!isPanning && panStart && Date.now() - panStartTime < TAP_THRESHOLD_MS) {
          const world = screenToWorld(panStart.x, panStart.y);
          placePiece(world.col, world.row);
        }
        isPanning = false;
        lastPan = null;
        panStart = null;
        panStartTime = 0;
      }

      function onWheel(e) {
        if (!gameActive) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const my = (e.clientY - rect.top) * (canvas.height / rect.height);
        const factor = e.deltaY > 0 ? 0.9 : 1.1;
        const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * factor));
        offsetX = mx - (mx - offsetX) * (newScale / scale);
        offsetY = my - (my - offsetY) * (newScale / scale);
        scale = newScale;
        requestDrawBoard();
      }

      function bindEvents() {
        canvas.addEventListener("mousedown", onPointerDown);
        window.addEventListener("mousemove", onPointerMove);
        window.addEventListener("mouseup", onPointerUp);
        canvas.addEventListener("wheel", onWheel, {passive: false});
        canvas.addEventListener("touchstart", onPointerDown, {passive: false});
        canvas.addEventListener("touchmove", onPointerMove, {passive: false});
        canvas.addEventListener("touchend", onPointerUp);
        canvas.addEventListener("touchcancel", onPointerUp);
        canvas.addEventListener("contextmenu", e => e.preventDefault());
      }

      function startGame(mode) {
        winCondition = parseInt(mode);
        // Desktop
        modePanel.style.display = "none";
        gamePanel.style.display = "flex";
        // Mobile
        mobileModePanel.style.display = "none";
        mobileGamePanel.style.display = "flex";
        coverImage.style.display = "none";
        gameActive = true;
        adjustBoardSize();
        resetGame();
      }

      function backToMode() {
        gameActive = false;
        gameOver = true;
        // Desktop
        gamePanel.style.display = "none";
        modePanel.style.display = "block";
        // Mobile
        mobileGamePanel.style.display = "none";
        mobileModePanel.style.display = "block";
        coverImage.style.display = "block";
        winImage.style.display = "none";
        mobileWinMessage.textContent = "";
        if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
        adjustBoardSize();
      }

      function updateRestartButton() {
        const isOver = gameOver;
        restartBtn.classList.toggle("highlight-btn", isOver);
        mobileRestartBtn.classList.toggle("highlight-btn", isOver);
      }

      // Gán sự kiện cho tất cả nút mode (cả desktop và mobile)
      document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.addEventListener("click", e => startGame(e.currentTarget.dataset.mode));
      });

      // Desktop buttons
      undoTieuBtn.addEventListener("click", () => undoPlayer("Tieu"));
      undoTungBtn.addEventListener("click", () => undoPlayer("Tung"));
      restartBtn.addEventListener("click", resetGame);
      backToModeBtn.addEventListener("click", backToMode);

      // Mobile buttons
      mobileUndoTieuBtn.addEventListener("click", () => undoPlayer("Tieu"));
      mobileUndoTungBtn.addEventListener("click", () => undoPlayer("Tung"));
      mobileRestartBtn.addEventListener("click", resetGame);
      mobileBackToModeBtn.addEventListener("click", backToMode);

      window.addEventListener("resize", onResize);

      loadImages();
      bindEvents();

      // Khởi tạo trạng thái ban đầu
      modePanel.style.display = "block";
      gamePanel.style.display = "none";
      mobileModePanel.style.display = "block";
      mobileGamePanel.style.display = "none";
      coverImage.style.display = "block";
      gameActive = false;
      ctx = canvas.getContext("2d");
      window.addEventListener("load", adjustBoardSize);
      if (document.readyState === "complete") adjustBoardSize();
    })();
  </script>
</body>
</html>
